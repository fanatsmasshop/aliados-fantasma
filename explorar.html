<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Explorar negocios | Aliados Fantasma</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="sistema-visual.css?v=20260720-320">
</head>
<body class="redirect-page">
  <main class="empty-state" style="max-width:720px;margin:12vh auto;padding:32px;text-align:center">
    <img src="aliados-fantasma-icono.webp" alt="Aliados Fantasma" style="width:82px;height:82px;object-fit:contain">
    <p class="eyebrow">ALIADOS FANTASMA</p>
    <h1 id="gate-title">Comprobando acceso…</h1>
    <p id="gate-message" class="muted">Estamos preparando el directorio público.</p>
    <div id="gate-actions" class="actions" style="justify-content:center"></div>
  </main>
  <script type="module">
    import { getLaunchState, canAccessPublicAreaBeforeLaunch, LAUNCH_LABEL } from './launch-control.js?v=20260720-600';
    const title = document.querySelector('#gate-title');
    const message = document.querySelector('#gate-message');
    const actions = document.querySelector('#gate-actions');
    const launchState = await getLaunchState();

    if (await canAccessPublicAreaBeforeLaunch()) {
      location.replace('index-oficial.html#negocios');
    } else {
      title.textContent = 'La red todavía está despertando.';
      message.textContent = `El directorio público se habilitará automáticamente el ${LAUNCH_LABEL}. Mientras tanto, los negocios pueden registrarse y preparar su perfil.`;
      actions.innerHTML = '<a class="button primary" href="registro.html">Registrar negocio</a><a class="button secondary" href="index.html">Volver al inicio</a>';
    }
  </script>
</body>
</html>
