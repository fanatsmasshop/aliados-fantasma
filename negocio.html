<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Negocio | Aliados Fantasma</title><link rel="stylesheet" href="app.css"><script src="supabase-config.js"></script></head><body><header class="topbar"><nav class="container nav"><a class="brand" href="panel.html"><span class="brand-mark">AF</span><span>ALIADOS FANTASMA<small>Administración</small></span></a><button class="btn" id="logout">Cerrar sesión</button></nav></header><div class="layout"><aside class="sidebar"><a href="panel.html">← Regresar al panel</a><a class="active" href="#">Datos del negocio</a></aside><main class="main"><span class="eyebrow">Gestión</span><h2 id="pageTitle">Nuevo negocio</h2><div id="message" class="notice hidden"></div><form id="businessForm" class="card form-grid"><div class="field"><label>Nombre *</label><input name="nombre" required></div><div class="field"><label>Slug *</label><input name="slug" required pattern="[a-z0-9-]+"></div><div class="field"><label>Categoría</label><select name="categoria_id" id="categoria_id"></select></div><div class="field"><label>Estado</label><select name="estado"><option value="borrador">Borrador</option><option value="revision">Revisión</option><option value="activo">Activo</option><option value="pausado">Pausado</option><option value="oculto">Oculto</option><option value="archivado">Archivado</option></select></div><div class="field full"><label>Descripción corta</label><input name="descripcion_corta" maxlength="180"></div><div class="field full"><label>Descripción completa</label><textarea name="descripcion"></textarea></div><div class="field"><label>WhatsApp</label><input name="whatsapp"></div><div class="field"><label>Teléfono</label><input name="telefono"></div><div class="field"><label>Correo</label><input name="correo" type="email"></div><div class="field"><label>Sitio web</label><input name="sitio_web" type="url"></div><div class="field full"><label>Dirección</label><input name="direccion"></div><div class="field"><label>Colonia</label><input name="colonia"></div><div class="field"><label>Municipio</label><input name="municipio"></div><div class="field"><label>Estado / región</label><input name="estado_region" value="Estado de México"></div><div class="field"><label>Código postal</label><input name="codigo_postal"></div><div class="field full"><label>Enlace de Google Maps</label><input name="enlace_maps" type="url"></div><div class="field full"><label>URL del logo</label><input name="logo_url" type="url"></div><div class="field full"><label>URL de portada</label><input name="portada_url" type="url"></div><div class="field"><label>Color primario</label><input name="color_primario" value="#6d4aff"></div><div class="field"><label>Color secundario</label><input name="color_secundario" value="#15d7ff"></div><div class="field full"><button class="btn btn-primary" type="submit">Guardar negocio</button></div></form></main></div><script type="module" src="negocio.js"></script></body></html>
