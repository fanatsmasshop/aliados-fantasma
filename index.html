<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Aliados Fantasma | Fantasmas Biker's Shop</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      text-align: center;
      background:
        radial-gradient(circle at top, #18334f 0%, #080a0f 45%, #000 100%);
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 38px 26px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      background: rgba(12, 15, 22, 0.88);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
    }

    .tag {
      display: inline-block;
      padding: 7px 13px;
      margin-bottom: 15px;
      border-radius: 999px;
      background: rgba(32, 154, 255, 0.14);
      color: #75c7ff;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    p {
      margin: 0 0 26px;
      color: #c9cbd2;
      line-height: 1.6;
    }

    .button {
      display: block;
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, #087cca, #ca247e);
      font-size: 17px;
      font-weight: bold;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .small {
      margin-top: 20px;
      margin-bottom: 0;
      font-size: 12px;
      color: #858995;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="tag">Aliados Fantasma</div>

    <h1>Bienvenido a Fantasmas</h1>

    <p>
      Descubre nuestro programa de recompensas, productos y beneficios
      exclusivos para nuestra comunidad.
    </p>

    <a
      class="button"
      href="AQUI-VA-EL-ENLACE-DE-CLUBFIEL"
      target="_blank"
      rel="noopener noreferrer"
    >
      Entrar a Fantasmas Rewards
    </a>

    <p class="small">
      Fantasmas Biker's Shop · Cd. Azteca, Ecatepec
    </p>
  </main>
</body>
</html>
